<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <title>Quiz</title>

    <style>
      .progress-bar {
        height: 8px;
        background: #eee;
        border-radius: 10px;
        margin-bottom: 15px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: #66b3ff;
        width: 0%;
        transition: 0.3s;
      }
      body {
        margin: 0;
        font-family: "Fahkwang", sans-serif;
        background: #fff3b0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        background: #ffffff;
        padding: 30px 20px;
        border-radius: 30px;
        width: 300px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      .choice {
        padding: 12px;
        border-radius: 25px;
        margin: 10px 0;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #eee;
      }
      .choice:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .progress {
        color: #888;
        margin-bottom: 10px;
      }

      h1 {
        color: #ff4d88;
        font-size: 19px;
        line-height: 1.5;
      }

      .choice {
        padding: 12px;
        border-radius: 25px;
        margin: 10px 0;
        cursor: pointer;
        transition: 0.2s;
      }

      .choice:nth-child(odd) {
        background: hsl(293, 100%, 94%);
      }

      .choice:nth-child(even) {
        background: hsl(293, 100%, 94%);
      }

      .choice:hover {
        transform: scale(1.05);
      }

      button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #66b3ff;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #4da6ff;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <script>
      const questions = [
        {
          q: "เห็นศิลปินปล่อยของใหม่ คุณจะ...",
          a: ["กดเลย 💳", "ดูก่อน หมายถึงดูของครบก่อน 👀"],
        },
        {
          q: "ของกำลังจะหมด คุณจะ...",
          a: ["รีบกด ⚡", "ลังเลนิดนึงเดี๋ยวกดวันหลัง"],
        },
        {
          q: "เงินเดือนออกแล้ว คุณจะ...",
          a: ["พร้อมเปย์ ขอแค่ได้จ่าย 💸", "ต้องประหยัดแต่ประหยัดเดือนหน้า 🪙"],
        },
        {
          q: "เวลาเห็นของน่ารัก คุณจะ...",
          a: ["ต้องมี 🛍️", "คิดก่อน แต่กดก็ได้ 🤔"],
        },
        {
          q: "ถ้าเป็นของลิมิเต็ด...",
          a: ["ต้องได้ ต้องมี ต้องเอา 🎁", "ปล่อยผ่าน ค่อยกดวันหลัง"],
        },
        {
          q: "เวลาจะกดซื้อของ",
          a: ["กดก่อนคิดทีหลัง 💳", "คิดก่อนแล้วกดเลย รออะไรล่ะ 👀"],
        },
        {
          q: "คุณเคยบอกตัวเองว่า 'พอแล้ว' ไหม",
          a: ["เคย แต่ไม่เคยพอ 😂", "พอจริงแต่เอามาก่อน 👍"],
        },
        { q: "พัสดุที่บ้านคุณ", a: ["มาเรื่อย ๆ 📦", "ก็มาดิค้าบบ"] },
        {
          q: "เวลาลงรูปโปรโมต",
          a: ["ใจสั่นสั่งทันที 🫰🏻", "เฉย ๆ ก่อน แล้วกดจ่าย"],
        },
        {
          q: "งบที่ตั้งไว้",
          a: ["ไม่เคยอยู่ในงบ 📊", "พยายามคุมได้ แต่ควบคุมทำไม"],
        },
        { q: "เวลามีของใหม่", a: ["รีบกด 🛒", "รอดูรีวิว⭐⭐"] },
        {
          q: "ถ้าต้องกดเลยคุณเป็นคนแบบไหน",
          a: ["ของมันต้องมี 👜", "ไม่จำเป็นแต่เอามาก่อนก็ได้"],
        },
        {
          q: "ถ้าเงินไม่พอ",
          a: ["ก็หาทางกดมาก่อน 😂", "ไม่ซื้อ...ไม่ซื้อข้าวแต่ซื้อของ"],
        },
        { q: "เวลาคิดจะซื้อของ", a: ["ใช้อารมณ์ 💸", "ใช้เงิน🪙"] },
        {
          q: "คุณกดซื้อเร็วแค่ไหน",
          a: ["เร็วมาก ⚡", "เร็วเหมือนกันแค่ไม่เหมือนข้างบน"],
        },
        { q: "เวลาเห็นคนอื่นรีวิว", a: ["โดนตก 🛍️", "เฉย ๆ แต่เอามาก่อน"] },
        { q: "ถ้าของหมด", a: ["เสียดายมาก 😭", "ไม่เป็นไร กดแล้วเหมือนกัน"] },
        {
          q: "คุณเคยซื้อซ้ำไหม",
          a: ["ซื้อซ้ำแน่นอน 💳", "ไม่ค่อย แต่มีอยู่ 2"],
        },
        {
          q: "เวลามีเงิน",
          a: [
            "ใช้เลยรออะไรล่ะค้าบ 💸",
            "เก็บก่อนเพื่อความสบายใจ พรุ่งนี้ค่อยกด 🪙",
          ],
        },
        { q: "ถ้าชอบมาก", a: ["ราคาไม่สำคัญ 🤑", "ราคาสำคัญ แต่เอามา1"] },
        {
          q: "คุณเปิดแอปช้อปปิ้งบ่อยไหม",
          a: ["ในหนึ่งวันก็บ่อยมาก 👀", "ไม่บ่อย แค่ทุกวัน"],
        },
        { q: "เวลามีโปรลดราคา", a: ["กดทันที 🔥", "เฉย ๆ แต่ต้องได้ส่วนลด"] },
        {
          q: "สุดท้ายแล้วคุณเป็นคนแบบไหน",
          a: ["สายกดแล้วจ่าย💳", "สายคิดแล้วกด กดแล้วจ่าย 🪙"],
        },
      ];

      const results = [
        "🦊 คุณคือเหรินชินสายกด กดมาก่อนค่อยว่ากัน 💸🫰🏻",
        "🦊 คุณคือเหรินชินสายประหยัด แต่พอมีออกของใหม่ก็จบกดมาก่อน 💛🛍️",
        "🦊 คุณคือเหรินชินสายด่วนไม่กดไม่ได้ เดี๋ยวของหมด ⚡🛒",
        "🦊 คุณคือเหรินชินสายเก็บ...เก็บแล้วกด 🪙💵",
        "🦊 คุณคือเหรินชินสายของมันต้องมี ต่อให้ไม่มีเงินก็ต้องมี 🛍️👜",
        "🦊 คุณคือเหรินชินสายเห็นราคาแล้วใจสั่น แต่กดอยู่ดี 💳🤑",
        "🦊 คุณคือเหรินชินสายไม่ซื้อวันนี้ พรุ่งนี้ก็ซื้ออยู่ดี 🎁🔁",
        "🦊 คุณคือเหรินชินสายบอกจะดูเฉย ๆ แต่สุดท้ายกดจ่าย 👀💳",
        "🦊 คุณคือเหรินชินสายตั้งงบไว้…แต่ไม่เคยอยู่ในงบ 📊💸",
        "🦊 คุณคือเหรินชินสายจ่ายไวกว่าเน็ตบ้านอีก ⚡💳",
        "🦊 คุณคือเหรินชินสายประหยัดแต่กดตลอด 💛💸",
        "🦊 คุณคือเหรินชินสายแค่เปิดดู แต่รูดจริงทุกครั้ง 👀🛍️",
      ];

      let step = 0;

      startHome();

      function startHome() {
        document.getElementById("app").innerHTML = `
    <div class="container">
      <h1>🦊คุณเป็นเหรินชินสายไหนเวลาซื้อของ🛒💸🤑?</h1>
      <p>ตอบคำถามเพื่อค้นหาว่าคุณคือเหรินชินสายไหน 💸✨</p>
      <button onclick="startQuiz()">เริ่มเลย!</button>
    </div>
  `;
      }

      function startQuiz() {
        step = 0;
        showQuestion();
      }

      function showQuestion() {
        let q = questions[step];
        let percent = (step / questions.length) * 100;

        let html = `
    <div class="container">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${percent}%"></div>
      </div>

      <div class="progress">ข้อ ${step + 1} / ${questions.length}</div>
      <h1>${q.q}</h1>
  `;

        q.a.forEach((choice) => {
          html += `<div class="choice" onclick="nextQuestion()">${choice}</div>`;
        });

        html += `</div>`;
        document.getElementById("app").innerHTML = html;
      }

      function nextQuestion() {
        step++;

        if (step < questions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }

      function showResult() {
        let randomResult = results[Math.floor(Math.random() * results.length)];

        document.getElementById("app").innerHTML = `
    <div class="container">
      <h1>${randomResult}</h1>

      <button onclick="shareResult('${randomResult}')">🦊แชร์ผลลัพธ์ 📤</button>
      <button onclick="startQuiz()">เล่นอีกครั้ง</button>
    </div>
  `;
      }

      function shareResult(text) {
        if (navigator.share) {
          navigator.share({
            title: "ผลลัพธ์ของฉัน🦊",
            text: text,
            url: window.location.href,
          });
        } else {
          alert("คัดลอกไปแชร์ได้เลย:\n" + text);
        }
      }
    </script>
  </body>
</html>
